name: Index Docs into Vectorize

on:
  push:
    branches: [main]
    paths:
      - '**/*.mdx'
      - 'docs.json'
      - 'scripts/index-docs.mjs'
      - '.github/workflows/index-docs.yml'
  workflow_dispatch:

concurrency:
  group: index-docs
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  index:
    name: Embed + upsert
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Walk MDX → embed → upsert
        env:
          # API token: sensitive — must be set as a repo secret. Needs
          # Account → Workers AI → Read + Account → Vectorize → Edit.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account ID: NOT sensitive — it's an identifier visible in any
          # Cloudflare dashboard URL. Inlining avoids requiring a second
          # repo secret in this repo.
          CLOUDFLARE_ACCOUNT_ID: c38732aacc9359a9294ae7f0e6d2f47a
          SITE_BASE: https://docs.takumo.io
          VECTORIZE_INDEX: takumo-docs-index
        run: node scripts/index-docs.mjs
